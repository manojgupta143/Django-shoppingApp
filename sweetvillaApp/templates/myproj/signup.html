<!DOCTYPE html>{%extends "myproj/base.html"%} {% block title_block %} Signup {% endblock %} {% block body_block %}
<div class=" container cont">
    <!-- Back to Home Link -->
    <div class="mb-3">
        <a href="/" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left me-2"></i>Back to Home
        </a>
    </div>
    
    <div class="text-center">
        <h3>Create an account</h3> <span class="abt">Already have an account? <a href="/accounts/login" >Login</a></span>
    </div>
    <div class="form mt-3">
        <form method="post">
            <div class="form-outline">
                {% csrf_token %} {%for fm in form%} {{fm.label_tag}} {{fm}}{{fm.errors|striptags}}<br> <br> {%endfor%}
                <input type="submit" class="btn btn-primary btn-lg btn-block" value="Signup">
            </div>
        </form>
    </div>
</div>
{%endblock%}

services:
  - type: web
    name: django-shoppingapp
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn Sweetvilla.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_DATABASE_URL
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: django-shoppingapp-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "django-shoppingapp.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://django-shoppingapp.onrender.com"

databases:
  - name: django-shoppingapp-db
    databaseName: django_shoppingapp
    user: django_shoppingapp_user
    plan: free
